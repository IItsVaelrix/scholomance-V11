name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Lint
      run: npm run lint

    - name: Verify backend contract
      run: npm run verify:backend-contract

    - name: Run Unit Tests
      run: npm run test -- --run

    - name: Run QA Feature Tests
      run: npm run test:qa:features

    - name: Run QA Backend Tests
      run: npm run test:qa:backend

    - name: Run E2E Tests
      run: npm run test:e2e

    - name: Build app bundle
      run: npm run build:app
