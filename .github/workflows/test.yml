name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Assuming Node.js 18, adjust if necessary based on project needs

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm run test

