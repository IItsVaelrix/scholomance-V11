services:
  - type: web
    name: scholomance-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health/ready
    disk:
      name: scholomance-data
      mountPath: /var/data
      sizeGB: 500
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SCHOLOMANCE_DICT_PATH
        value: /var/data/scholomance_dict.sqlite
      - key: SCHOLOMANCE_CORPUS_PATH
        value: /var/data/scholomance_corpus.sqlite
      - key: RHYME_ASTROLOGY_OUTPUT_DIR
        value: /var/data/rhyme-astrology
      - key: USER_DB_PATH
        value: /var/data/scholomance_user.sqlite
      - key: COLLAB_DB_PATH
        value: /var/data/scholomance_collab.sqlite
      - key: AUDIO_STORAGE_PATH
        value: /var/data/audio
      - key: TRUST_PROXY
        value: true
      - key: ENABLE_COLLAB_API
        value: false
      - key: AUDIO_ADMIN_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false # This tells Render to ask for the value during deploy
      - key: SESSION_SECRET
        generateValue: true
